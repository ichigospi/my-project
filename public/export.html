<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>データエクスポート</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center">
<h2>台本分析データ エクスポート</h2>
<button id="btn" style="padding:16px 32px;font-size:18px;cursor:pointer;background:#6366f1;color:white;border:none;border-radius:8px">
  エクスポート（JSONダウンロード）
</button>
<p id="msg" style="margin-top:20px;color:#666"></p>
<script>
document.getElementById("btn").onclick = function() {
  var analyses = JSON.parse(localStorage.getItem("fortune_yt_analyses") || "[]");
  var proposals = JSON.parse(localStorage.getItem("fortune_yt_proposals") || "[]");
  var data = JSON.stringify({analyses: analyses, proposals: proposals}, null, 2);
  var blob = new Blob([data], {type: "application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "script-analyses-export.json";
  a.click();
  document.getElementById("msg").textContent = analyses.length + "件の分析データをエクスポートしました";
};
</script>
</body></html>
